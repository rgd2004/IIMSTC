# fly.toml generated for PKC CAG server
# You can adjust app name and region with `fly launch`

app = "pkc-cag-server" # change this to your Fly app name
primary_region = "sin" # e.g. sin, bom, iad, fra, etc.

[build]
  # Use the Dockerfile in this folder
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

[[services]]
  internal_port = 5000
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
